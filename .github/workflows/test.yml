name: Amazon Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ./challenge-1-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: challenge-1-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run WDIO tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: challenge-1-web/screenshots/
          retention-days: 7
          if-no-files-found: warn